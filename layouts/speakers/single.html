{{ define "main" }}
<article class="page">
  <h1>{{ .Title }}</h1>
  {{ .Content }}

  <div class="person-grid">
    {{ range hugo.Data.speakers }}
      {{ partial "person-card.html" . }}
    {{ end }}
  </div>

  <h2 class="section-heading">Organizing Team 2026</h2>
  <div class="person-grid">
    {{ range hugo.Data.organizers }}
      {{ partial "person-card.html" . }}
    {{ end }}
  </div>
</article>
{{ end }}
