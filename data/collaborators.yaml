- name: "Jeanne Vogt"
  role: "Node Forum / Display"
  img: "https://nodeforum.org/wp-content/uploads/Jeanne-Vorschau-8154-2.jpg"
  url: "https://nodeforum.org/people/jeanne-charlotte-vogt/"
  bio: "Jeanne is a dramaturge, curator and cultural producer. Since 2017, she is the artistic and managing director of NODE. Trained in management theory, working in arts and culture, she embodies the multidisciplinary perspective in the team. Her projects are working at the intersection between the digital arts, performance and technology, always aiming at spreading the means for the critical reflection and application of technology."
